<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light only">
  <title>Page Not Found | InboxNavigator</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1e1054;
      --accent: #a855f7;
      --pink: #e84393;
      --orange: #f97316;
      --gradient: linear-gradient(135deg, #a855f7, #e84393, #f97316);
      --gradient-text: linear-gradient(90deg, #e84393, #f97316);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #faf9fe;
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 540px;
      width: 100%;
    }

    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      margin-bottom: 3rem;
      letter-spacing: -0.02em;
    }

    .logo-inbox {
      background: var(--gradient-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-navigator {
      color: var(--navy);
    }

    .error-code {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 400;
      line-height: 1;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }

    .subheading {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: var(--navy);
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    .body-text {
      font-size: 1.0625rem;
      color: #5a5278;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.875rem 2rem;
      border-radius: 100px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4);
    }

    .btn-secondary {
      background: transparent;
      color: var(--navy);
      border: 2px solid rgba(30, 16, 84, 0.15);
    }

    .btn-secondary:hover {
      border-color: rgba(30, 16, 84, 0.3);
      box-shadow: 0 4px 16px rgba(30, 16, 84, 0.08);
    }

    @media (max-width: 480px) {
      .buttons {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span class="logo-inbox">Inbox</span><span class="logo-navigator">Navigator</span>
    </div>

    <div class="error-code">404</div>

    <h1 class="subheading">This page wandered off</h1>

    <p class="body-text">
      The page you're looking for doesn't exist or has been moved.
      Let's get you back on track.
    </p>

    <div class="buttons">
      <a href="https://inboxnavigator.com/" class="btn btn-primary">Back to Home</a>
      <a href="https://app.inboxnavigator.com/" class="btn btn-secondary">Go to App</a>
    </div>
  </div>
</body>
</html>
